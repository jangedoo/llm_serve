; Measured on llama.cpp b9873 with CUDA0 = RTX PRO 4000 Blackwell 24 GB
; and CUDA1 = RTX 2070 SUPER 8 GB. All profiles reserve one shared 128K
; F16 KV cache; mmap and explicit placement avoid auto-fit variability.
[*]
ctx-size             = 131072
cache-type-k         = f16
cache-type-v         = f16
kv-unified           = 1
kv-offload           = 1
flash-attn           = on
mmap                 = 1
mlock                = 0
fit                  = off
threads              = 6
threads-batch        = 6
no-mmproj            = 1
temp                  = 0.6
top-p                 = 0.9
top-k                 = 40
min-p                 = 0.01

[Qwen3.6-35B-A3B]
; Four slots gave the best aggregate throughput. The 4:1 layer split keeps
; most work on Blackwell while retaining safe VRAM headroom on the 2070.
hf                    = unsloth/Qwen3.6-35B-A3B-GGUF:Qwen3.6-35B-A3B-UD-Q4_K_M
device                = CUDA0,CUDA1
split-mode            = layer
tensor-split          = 4,1
main-gpu              = 0
n-gpu-layers          = all
parallel              = 4
batch-size            = 4096
ubatch-size           = 1024
temp                  = 0.7
top-p                 = 1.0

[Qwen3.6-27B]
; The 4:1 split performed within 3% of 3:1 while using 1.2 GiB less 2070 VRAM.
; 2048/512 was the stable measured batch pair for this dense model.
hf                    = unsloth/Qwen3.6-27B-GGUF:Qwen3.6-27B-Q4_K_M
device                = CUDA0,CUDA1
split-mode            = layer
tensor-split          = 4,1
main-gpu              = 0
n-gpu-layers          = all
parallel              = 4
batch-size            = 2048
ubatch-size           = 512
min-p                 = 0.00

[Qwen3.6-27B-MTP]
; MTP is limited to one slot. Draft length 2 delivered the best measured
; decode rate: 41.72 tok/s, 1.67x over the non-speculative baseline.
hf                    = unsloth/Qwen3.6-27B-MTP-GGUF:Qwen3.6-27B-UD-Q4_K_XL
device                = CUDA0,CUDA1
split-mode            = layer
tensor-split          = 4,1
main-gpu              = 0
n-gpu-layers          = all
parallel              = 1
batch-size            = 2048
ubatch-size           = 512
spec-type             = draft-mtp
spec-draft-n-max      = 2
temp                  = 0.7
top-p                 = 1.0

[gemma-4-E4B-it]
; The model and 128K KV cache fit on Blackwell alone. Eight slots maximize
; concurrent text throughput; the BF16 projector remains enabled for vision.
hf                    = unsloth/gemma-4-E4B-it-GGUF:gemma-4-E4B-it-UD-Q4_K_XL
device                = CUDA0
split-mode            = none
main-gpu              = 0
n-gpu-layers          = all
parallel              = 8
batch-size            = 4096
ubatch-size           = 1024
no-mmproj             = 0
temp                  = 0.8
top-p                 = 0.95
