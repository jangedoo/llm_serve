; ──────────────────────────────────────────────────────────────────────────────
; llama.cpp server preset — auto-tuned for this machine
;   CPU: AMD Ryzen 5 3600  (6C/12T)
;   RAM: 30 GiB
;   GPU: NVIDIA RTX PRO 4000 Blackwell  (24 GiB VRAM)
; ──────────────────────────────────────────────────────────────────────────────

[*]
threads             = 6
threads-batch       = 6
flash-attn          = on               ; saves VRAM at larger ctx
temp                = 0.6
top-p               = 0.9
top-k               = 40
min-p               = 0.01
mlock               = 0
no-kv-offload       = 0
no-mmap             = 1
no-mmproj           = 1
tools               = all

; ── Qwen3.6-35B-A3B (MoE, 35B total / 3B active, ~17 GiB with Q4_K_M) ──────
; Fits entirely on the 24 GiB GPU. Reasoning-capable model.
[Qwen3.6-35B-A3B]
hf                  = unsloth/Qwen3.6-35B-A3B-GGUF:Qwen3.6-35B-A3B-UD-Q4_K_M
ctx-size            = 65536
batch-size          = 2048
ubatch-size         = 2048
n-gpu-layers        = -1                ; offload everything to GPU
temp                = 0.7
top-p               = 1.0
min-p               = 0.01

; ── Gemma 4 4B (dense, 4B params, ~2.5 GiB with Q4_K_XL) ───────────────────
; Tiny model — leave room for very large context or vision.
[gemma-4-E4B-it]
hf                  = unsloth/gemma-4-E4B-it-GGUF:gemma-4-E4B-it-UD-Q4_K_XL
ctx-size            = 131072
batch-size          = 2048
ubatch-size         = 512               ; 2048 triggered GGML_ASSERT(n_inputs < GGML_SCHED_MAX_SPLIT_INPUTS)
n-gpu-layers        = -1
temp                = 0.8
top-p               = 0.95
min-p               = 0.01
no-mmproj           = 0

; ── Qwen3.6 27B (dense, 27B params, ~16 GiB with Q4_K_XL) ───────────────────
; Fits on the 24 GiB GPU with moderate ctx. Also has reasoning capability.
[Qwen3.6-27B-MTP]
hf                  = unsloth/Qwen3.6-27B-MTP-GGUF:Qwen3.6-27B-UD-Q4_K_XL
ctx-size            = 65536
batch-size          = 2048
ubatch-size         = 1024                ; slightly smaller to save VRAM for 27B
n-gpu-layers        = -1
temp                = 0.7
top-p               = 1.0
min-p               = 0.01
spec-type           = draft-mtp
spec-draft-n-max    = 2


[Qwen3.6-27B]
hf                  = unsloth/Qwen3.6-27B-GGUF:Qwen3.6-27B-Q4_K_M
ctx-size            = 65536
batch-size          = 2048
ubatch-size         = 1024                ; slightly smaller to save VRAM for 27B
n-gpu-layers        = -1
temp                = 0.6
top-p               = 0.95
min-p               = 0.00
